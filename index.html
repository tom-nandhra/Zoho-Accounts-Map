<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Account map</title>
<style>html,body,#map{height:100%;margin:0}#msg{font:14px/1.5 system-ui;padding:14px}</style>
</head>
<body>
<div id="map"></div>
<script>
// ---- config ----------------------------------------------------------
const GMAPS_KEY = "AIzaSyAKgOu5wCeIJFFcQey0vmVe_2ZSsdtEgeY";

// URL returning a JSON array of accounts. Either a static file committed to
// this repo (accounts.json) or a Zoho function REST endpoint of the same shape.
const DATA_URL = "accounts.json";

const FIELD_LAT="Billing_Latitude", FIELD_LNG="Billing_Longitude",
      FIELD_COLOR="RAG", FIELD_DESC="Description", FIELD_NAME="Account_Name";

const COLORS = { "Red":"#c62828", "Amber":"#f9a825", "Green":"#2e7d32", "_default":"#9e9e9e" };
// ----------------------------------------------------------------------

let accounts = [];
const esc = s => String(s).replace(/[&<>"]/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

function infoHtml(a){
  const d = a[FIELD_DESC] ? `<div style="margin-top:4px">${esc(a[FIELD_DESC])}</div>` : "";
  return `<div style="font:13px/1.45 system-ui,sans-serif;max-width:280px">`
       + `<div style="font-weight:600;font-size:14px">${esc(a[FIELD_NAME] || "")}</div>${d}</div>`;
}

async function initMap(){
  const { Map } = await google.maps.importLibrary("maps");
  const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");

  const map = new Map(document.getElementById("map"),
    { center:{lat:51.13,lng:-0.1}, zoom:6, mapId:"DEMO_MAP_ID" });
  const shared = new google.maps.InfoWindow();
  const bounds = new google.maps.LatLngBounds();
  let plotted = 0;

  accounts.forEach(a => {
    const lat = parseFloat(a[FIELD_LAT]), lng = parseFloat(a[FIELD_LNG]);
    if(isNaN(lat) || isNaN(lng)) return;
    const pos = { lat, lng };
    const color = COLORS[a[FIELD_COLOR]] || COLORS._default;
    const pin = new PinElement({ background:color, borderColor:"#000", glyphColor:"#fff" });
    const marker = new AdvancedMarkerElement({ map, position:pos, title:a[FIELD_NAME]||"", content:pin.element });
    marker.addListener("gmp-click", () => { shared.setContent(infoHtml(a)); shared.open({ map, anchor:marker }); });
    bounds.extend(pos); plotted++;
  });
  if(plotted) map.fitBounds(bounds);
}
window.initMap = initMap;

function loadGoogleMaps(){
  const s = document.createElement("script");
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&loading=async&libraries=marker&callback=initMap`;
  document.head.appendChild(s);
}

(async function(){
  try {
    const res = await fetch(DATA_URL, { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    accounts = await res.json();
  } catch(e){
    document.body.innerHTML = `<div id="msg">Couldn't load ${esc(DATA_URL)} — ${esc(e.message)}</div>`;
    return;
  }
  loadGoogleMaps();
})();
