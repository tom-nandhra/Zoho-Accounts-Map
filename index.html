<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Account map</title>
<style>
  html,body,#map{height:100%;margin:0}
  #status{position:fixed;top:8px;left:8px;z-index:5;background:#fff;border:1px solid #ccc;
          border-radius:6px;padding:6px 10px;font:13px/1.4 system-ui,sans-serif;max-width:90vw}
  #status.err{background:#fdecea;border-color:#c62828;color:#7a1c1c}
</style>
</head>
<body>
<div id="status">Starting…</div>
<div id="map"></div>
<script>
// ---- config ----------------------------------------------------------
const GMAPS_KEY = "AIzaSyAKgOu5wCeIJFFcQey0vmVe_2ZSsdtEgeY";
const DATA_URL  = "accounts.json";

const FIELD_LAT="Billing_Latitude", FIELD_LNG="Billing_Longitude",
      FIELD_COLOR="RAG", FIELD_DESC="Description", FIELD_NAME="Account_Name";
const COLORS = { "Red":"#c62828", "Amber":"#f9a825", "Green":"#2e7d32", "_default":"#9e9e9e" };
// ----------------------------------------------------------------------

const statusEl = document.getElementById("status");
function setStatus(msg, isErr){
  statusEl.textContent = msg;
  statusEl.className = isErr ? "err" : "";
  console.log("[map]", msg);
}
function hideStatus(){ statusEl.style.display = "none"; }

// Surface anything that would otherwise fail silently
window.addEventListener("error", e => setStatus("JS error: " + e.message, true));
window.addEventListener("unhandledrejection", e =>
  setStatus("Promise error: " + (e.reason && e.reason.message || e.reason), true));
window.gm_authFailure = () =>
  setStatus("Google Maps auth failed — check API key, billing, and referrer restriction.", true);

let accounts = [];
const esc = s => String(s).replace(/[&<>"]/g,
  c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

function infoHtml(a){
  const d = a[FIELD_DESC] ? `<div style="margin-top:4px">${esc(a[FIELD_DESC])}</div>` : "";
  return `<div style="font:13px/1.45 system-ui,sans-serif;max-width:280px">`
       + `<div style="font-weight:600;font-size:14px">${esc(a[FIELD_NAME] || "")}</div>${d}</div>`;
}

async function initMap(){
  try {
    setStatus("Loading Google Maps…");
    const { Map } = await google.maps.importLibrary("maps");
    const { AdvancedMarkerElement, PinElement } = await google.maps.importLibrary("marker");

    const map = new Map(document.getElementById("map"),
      { center:{lat:51.13,lng:-0.1}, zoom:6, mapId:"DEMO_MAP_ID" });
    const shared = new google.maps.InfoWindow();
    const bounds = new google.maps.LatLngBounds();
    let plotted = 0;

    accounts.forEach(a => {
      const lat = parseFloat(a[FIELD_LAT]), lng = parseFloat(a[FIELD_LNG]);
      if(isNaN(lat) || isNaN(lng)) return;
      const pos = { lat, lng };
      const color = COLORS[a[FIELD_COLOR]] || COLORS._default;
      const pin = new PinElement({ background:color, borderColor:"#000", glyphColor:"#fff" });
      const marker = new AdvancedMarkerElement({ map, position:pos, title:a[FIELD_NAME]||"", content:pin.element });
      marker.addListener("gmp-click", () => { shared.setContent(infoHtml(a)); shared.open({ map, anchor:marker }); });
      bounds.extend(pos); plotted++;
    });

    if(plotted){ map.fitBounds(bounds); hideStatus(); }
    else setStatus(`Map loaded, but 0 of ${accounts.length} records had usable coordinates.`, true);
  } catch(e){
    setStatus("Map init failed: " + e.message, true);
  }
}
window.initMap = initMap;

function loadGoogleMaps(){
  if(!GMAPS_KEY || GMAPS_KEY === "YOUR_GOOGLE_MAPS_API_KEY"){
    setStatus("No Google Maps API key set — edit GMAPS_KEY in the file.", true);
    return;
  }
  const s = document.createElement("script");
  s.onerror = () => setStatus("Google Maps script failed to load.", true);
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GMAPS_KEY}&loading=async&libraries=marker&callback=initMap`;
  document.head.appendChild(s);
}

(async function(){
  try {
    setStatus("Loading data from " + DATA_URL + " …");
    const res = await fetch(DATA_URL, { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status + " fetching " + DATA_URL);
    accounts = await res.json();
    if(!Array.isArray(accounts)) throw new Error("Data is not a JSON array");
    setStatus(`Loaded ${accounts.length} records.`);
  } catch(e){
    setStatus("Data load failed: " + e.message, true);
    return;
  }
  loadGoogleMaps();
})();
</script>
</body>
</html>
